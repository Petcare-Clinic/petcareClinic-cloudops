apiVersion: v1
kind: Service
metadata:
  name: admin-server
  namespace: {{ .Values.global.namespace | default "petclinic" }}
  labels:
    {{- include "admin-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    {{- include "admin-server.selectorLabels" . | nindent 4 }}
