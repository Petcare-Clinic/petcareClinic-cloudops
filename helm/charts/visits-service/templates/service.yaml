apiVersion: v1
kind: Service
metadata:
  name: visits-service
  namespace: {{ .Values.global.namespace | default "petclinic" }}
  labels:
    {{- include "visits-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    {{- include "visits-service.selectorLabels" . | nindent 4 }}
