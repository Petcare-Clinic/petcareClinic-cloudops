name: CD / Build Push and Update Manifests


on:
  push:
    branches: [ Dev, main ]


env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}


jobs:


  # ── JOB 1: Build Docker images and push to ECR ──────────────────────────
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest


    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      namespace: ${{ steps.set-tag.outputs.namespace }}


    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Set image tag and namespace based on branch
      id: set-tag
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          echo "image_tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "namespace=production" >> $GITHUB_OUTPUT
        else
          echo "image_tag=dev-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "namespace=dev" >> $GITHUB_OUTPUT
        fi


    - name: Fix mvnw line endings and permissions
      run: |
        sed -i 's/\r$//' upstream/mvnw
        chmod +x upstream/mvnw


    - name: Build Docker images with Maven
      run: |
        cd upstream
        ./mvnw clean install -P buildDocker \
          -Ddocker.image.prefix=${{ secrets.ECR_REGISTRY }} \
          -Dmaven.test.skip=true


    - name: Tag and push all images to ECR
      run: |
        IMAGE_TAG=${{ steps.set-tag.outputs.image_tag }}
        for svc in config-server discovery-server customers-service vets-service visits-service api-gateway admin-server; do
          docker tag \
            ${{ secrets.ECR_REGISTRY }}/spring-petclinic-${svc}:latest \
            ${{ secrets.ECR_REGISTRY }}/spring-petclinic-${svc}:${IMAGE_TAG}
          docker push \
            ${{ secrets.ECR_REGISTRY }}/spring-petclinic-${svc}:${IMAGE_TAG}
          echo "Pushed: spring-petclinic-${svc}:${IMAGE_TAG}"
        done


  # ── JOB 2: Update K8s manifests so ArgoCD picks up the new image ────────
  update-manifests:
    name: Update K8s Manifests for ArgoCD
    runs-on: ubuntu-latest
    needs: build-and-push


    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}


    - name: Set variables
      run: |
        echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_ENV
        echo "NAMESPACE=${{ needs.build-and-push.outputs.namespace }}" >> $GITHUB_ENV


    - name: Update image tags in K8s manifests
      run: |
        for svc in config-server discovery-server customers-service vets-service visits-service api-gateway admin-server; do
          find k8s/${{ env.NAMESPACE }} -name "*.yaml" | xargs sed -i \
            "s|${{ secrets.ECR_REGISTRY }}/spring-petclinic-${svc}:.*|${{ secrets.ECR_REGISTRY }}/spring-petclinic-${svc}:${{ env.IMAGE_TAG }}|g"
        done
        echo "Updated all manifests to image tag: ${{ env.IMAGE_TAG }}"


    - name: Verify manifest changes
      run: |
        git diff k8s/


    - name: Commit and push updated manifests
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/
        git diff --staged --quiet || git commit -m \
          "chore: update image tags to ${{ env.IMAGE_TAG }} for ${{ env.NAMESPACE }}"
        git push origin ${{ github.ref_name }}


  # ── JOB 3: Trigger ArgoCD sync ──────────────────────────────────────────
  argocd-sync:
    name: Sync ArgoCD Application
    runs-on: ubuntu-latest
    needs: update-manifests


    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}


    - name: Install ArgoCD CLI
      run: |
        curl -sSL -o argocd \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd
        sudo mv argocd /usr/local/bin/


    - name: Login to ArgoCD
      run: |
        argocd login \
          ${{ secrets.ARGOCD_SERVER }} \
          --username admin \
          --password ${{ secrets.ARGOCD_PASSWORD }} \
          --insecure


    - name: Sync ArgoCD application
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          argocd app sync petclinic-production --force
          argocd app wait petclinic-production --health --timeout 300
        else
          argocd app sync petclinic-dev --force
          argocd app wait petclinic-dev --health --timeout 300
        fi


    - name: Show application status
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          argocd app get petclinic-production
        else
          argocd app get petclinic-dev
        fi
        
